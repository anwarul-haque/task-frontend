<div class="modal-header">
  <h5 class="modal-title">{{ isEdit ? 'Edit Task' : 'New Task' }}</h5>
  <button type="button" class="btn-close" (click)="activeModal.dismiss()"></button>
</div>

<div class="modal-body">
  <form [formGroup]="form">

    <div class="mb-3">
      <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
      <input
        class="form-control"
        formControlName="title"
        placeholder="Enter task title"
        [class.is-invalid]="form.get('title')?.invalid && form.get('title')?.touched"
      />
      <div class="invalid-feedback">Title is required.</div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Description</label>
      <textarea
        class="form-control"
        formControlName="description"
        rows="3"
        placeholder="Optional description"
      ></textarea>
    </div>

    <!-- Assignee dropdown — visible for Manager and Team Lead only -->
    <div class="mb-3" *ngIf="canAssign">
      <label class="form-label fw-semibold">
        Assign To <span class="text-danger">*</span>
      </label>
      <select
        class="form-select"
        formControlName="assignedTo"
        [class.is-invalid]="form.get('assignedTo')?.invalid && form.get('assignedTo')?.touched"
      >
        <option value="" disabled>Select a user</option>
        <option *ngFor="let user of availableUsers" [value]="user._id" >
          {{ user.username }} ({{ user.role }})
        </option>
      </select>
      <div class="invalid-feedback">Please select an assignee.</div>
    </div>

    <div class="form-check">
      <input class="form-check-input" type="checkbox" formControlName="completed" id="completed" />
      <label class="form-check-label" for="completed">Mark as completed</label>
    </div>

  </form>
</div>

<div class="modal-footer">
  <button class="btn btn-secondary" (click)="activeModal.dismiss()">Cancel</button>
  <button class="btn btn-primary" (click)="save()" [disabled]="form.invalid">
    {{ isEdit ? 'Update Task' : 'Add Task' }}
  </button>
</div>
