<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="row w-100">
  
      <div class="col-md-6 col-lg-4 mx-auto">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-4">
  
            <h3 class="text-center mb-4">Register</h3>
  
            <!-- Success -->
            <div *ngIf="successMsg" class="alert alert-success">
              {{ successMsg }}
            </div>
  
            <!-- Error -->
            <div *ngIf="errorMsg" class="alert alert-danger">
              {{ errorMsg }}
            </div>
  
            <form [formGroup]="form" (ngSubmit)="onSubmit()">
  
              <!-- Name -->
              <div class="mb-3">
                <label class="form-label">User Name</label>
                <input type="text" class="form-control" formControlName="username" placeholder="Enter username">
  
                <div *ngIf="submitted && f['username'].errors" class="text-danger mt-1">
                  <small *ngIf="f['username'].errors['required']">User Name is required</small>
                  <small *ngIf="f['username'].errors['minlength']">Minimum 3 characters</small>
                </div>
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" formControlName="email" placeholder="Enter email">
  
                <div *ngIf="submitted && f['email'].errors" class="text-danger mt-1">
                  <small *ngIf="f['email'].errors['required']">Email is required</small>
                  <small *ngIf="f['email'].errors['email']">Invalid email</small>
                </div>
              </div>
  
              <!-- Password -->
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" formControlName="password" placeholder="Enter password">
  
                <div *ngIf="submitted && f['password'].errors" class="text-danger mt-1">
                  <small *ngIf="f['password'].errors['required']">Password is required</small>
                  <small *ngIf="f['password'].errors['minlength']">Minimum 6 characters</small>
                </div>
              </div>
  
              <!-- Confirm Password -->
              <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" formControlName="confirmPassword" placeholder="Confirm password">
  
                <div *ngIf="submitted && f['confirmPassword'].errors" class="text-danger mt-1">
                  <small *ngIf="f['confirmPassword'].errors['required']">Confirm password is required</small>
                  <small *ngIf="f['confirmPassword'].errors['mismatch']">Passwords do not match</small>
                </div>
              </div>
  
              <!-- Submit -->
              <button type="submit" class="btn btn-success w-100" [disabled]="loading">
                <span *ngIf="!loading">Register</span>
                <span *ngIf="loading" class="spinner-border spinner-border-sm"></span>
              </button>
  
            </form>
  
            <!-- Login link -->
            <div class="text-center mt-3">
              <small>
                Already have an account?
                <a routerLink="/login">Login</a>
              </small>
            </div>
  
          </div>
        </div>
      </div>
  
    </div>
  </div>
