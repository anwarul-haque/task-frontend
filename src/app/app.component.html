<!-- Global Error Toast -->
<div *ngIf="errorMessage" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100">
  <div class="toast show align-items-center text-bg-danger border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body">{{ errorMessage }}</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="dismissError()"></button>
    </div>
  </div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand" routerLink="/tasks">Task Manager</a>

    <ul class="navbar-nav me-auto ms-3" *ngIf="authService.isLoggedIn() && user">
      <li class="nav-item" *ngIf="user.role === 'Manager'" routerLinkActive="active">
        <a class="nav-link" routerLink="/users" routerLinkActive="active">Users</a>
      </li>
      <li class="nav-item" routerLinkActive="active">
        <a class="nav-link" routerLink="/tasks" routerLinkActive="active">Tasks</a>
      </li>
    </ul>

    <div class="ms-auto" *ngIf="authService.isLoggedIn() && user">
  
      <div class="dropdown">
        <button
          class="btn btn-secondary dropdown-toggle"
          data-bs-toggle="dropdown"
        >
          👤 {{ user.username }} ({{ user.role || 'User' }})
        </button>
  
        <ul class="dropdown-menu dropdown-menu-end">
  
          <li>
            <button class="dropdown-item text-danger" (click)="logout()">
              Logout
            </button>
          </li>
  
        </ul>
      </div>
  
    </div>
  </nav>
  
  <!-- Main Content -->
  <div class="container mt-3">
    <router-outlet></router-outlet>
  </div>
