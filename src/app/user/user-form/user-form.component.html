<div class="modal-header">
  <h5 class="modal-title">{{ isEdit ? 'Edit User' : 'Add User' }}</h5>
  <button type="button" class="btn-close" (click)="activeModal.dismiss()"></button>
</div>

<div class="modal-body">
  <form [formGroup]="form">

    <div class="mb-3">
      <label class="form-label">Username <span class="text-danger">*</span></label>
      <input type="text" class="form-control" formControlName="username"
        [class.is-invalid]="form.get('username')?.invalid && form.get('username')?.touched" />
      <div class="invalid-feedback">Username is required.</div>
    </div>

    <div class="mb-3">
      <label class="form-label">Email <span class="text-danger">*</span></label>
      <input type="email" class="form-control" formControlName="email"
        [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched" />
      <div class="invalid-feedback">Valid email is required.</div>
    </div>

    <div class="mb-3">
      <label class="form-label">Password {{ isEdit ? '(leave blank to keep current)' : '' }} <span *ngIf="!isEdit" class="text-danger">*</span></label>
      <input type="password" class="form-control" formControlName="password"
        [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched" />
      <div class="invalid-feedback">Password is required.</div>
    </div>

    <div class="mb-3">
      <label class="form-label">Role <span class="text-danger">*</span></label>
      <select class="form-select" formControlName="role">
        <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
      </select>
    </div>

    <div class="mb-3" *ngIf="isEmployee && teamLeads.length > 0">
      <label class="form-label">Assign to Team Lead</label>
      <select class="form-select" formControlName="teamLead">
        <option value="">-- None --</option>
        <option *ngFor="let tl of teamLeads" [value]="tl._id ? tl._id.toString() : ''">{{ tl.username }}</option>
      </select>
    </div>

  </form>
</div>

<div class="modal-footer">
  <button class="btn btn-secondary" (click)="activeModal.dismiss()">Cancel</button>
  <button class="btn btn-primary" (click)="save()" [disabled]="form.invalid">
    {{ isEdit ? 'Update' : 'Create' }}
  </button>
</div>
